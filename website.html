<!DOCTYPE html>
<html>
<head>
  <title>YouTube Downloader</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 420px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }
    #usage {
  margin-top: 10px;
  color: #94a3b8;
  font-size: 14px;
}

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }

    #title {
      margin-top: 10px;
      font-weight: bold;
    }

    #error {
      color: #f87171;
      margin-top: 10px;
    }

    .loader {
      border: 3px solid #334155;
      border-top: 3px solid white;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

  </style>
</head>

<body>

<div class="card">

  <input id="url" placeholder="Paste YouTube URL" oninput="loadVideoInfo()">
    <p id="usage">Usage: 0 / 10</p>
  <div id="preview" style="display:none;">
    <img id="thumb">
    <div id="title"></div>
  </div>

  <select id="format" onchange="toggleQuality()">
    <option value="mp4">MP4</option>
    <option value="mp3">MP3</option>
  </select>

  <select id="quality">
    <option value="1080">1080p</option>
    <option value="720">720p</option>
    <option value="480">480p</option>
  </select>

  <button id="btn" onclick="downloadVideo()">Download</button>

  <div id="error"></div>

</div>

<script>
    loadUsage();
  // -------------------------
  // PREVIEW VIDEO INFO
  // -------------------------
  function loadVideoInfo() {

    const url = document.getElementById("url").value;
    const videoId = extractVideoId(url);

    if (!videoId) return;

    document.getElementById("preview").style.display = "block";
    document.getElementById("thumb").src =
      `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

    document.getElementById("title").innerText = "Loading...";

    fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
      .then(r => r.json())
      .then(data => {
        document.getElementById("title").innerText = data.title;
      })
      .catch(() => {
        document.getElementById("title").innerText = "Unknown title";
      });
  }

  function extractVideoId(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes("youtu.be")) {
        return u.pathname.slice(1);
      }
      return u.searchParams.get("v");
    } catch {
      return null;
    }
  }

  // -------------------------
  // SHOW/HIDE QUALITY
  // -------------------------
  function toggleQuality() {
    const format = document.getElementById("format").value;
    const quality = document.getElementById("quality");

    quality.style.display = (format === "mp3") ? "none" : "block";
  }

  toggleQuality();

  // -------------------------
  // DOWNLOAD
  // -------------------------
  async function downloadVideo() {

    const url = document.getElementById("url").value;
    const format = document.getElementById("format").value;
    const quality = document.getElementById("quality").value;

    const btn = document.getElementById("btn");
    const error = document.getElementById("error");

    error.innerText = "";

    // -------------------------
    // FRONTEND VALIDATION
    // -------------------------
    if (!url || !extractVideoId(url)) {
      error.innerText = "Invalid YouTube URL";
      return;
    }

    // -------------------------
    // LOADING STATE
    // -------------------------
    btn.disabled = true;
    btn.innerHTML = `<span class="loader"></span>Processing...`;

    try {

      const res = await fetch(
        "http://127.0.0.1:5000/download?url=" +
        encodeURIComponent(url) +
        "&format=" + format +
        "&quality=" + quality
      );

      // if backend returns error
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || "Download failed");
      }

      // download file
      const blob = await res.blob();
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "video";
      link.click();

    } catch (err) {
      error.innerText = err.message;
    }

    // reset UI
    btn.disabled = false;
    btn.innerHTML = "Download";
    loadUsage();
  }

  async function loadUsage() {
  try {
    const res = await fetch("http://127.0.0.1:5000/usage");
    const data = await res.json();

    document.getElementById("usage").innerText =
      `Usage: ${data.used} / ${data.limit}`;
  } catch (e) {
    console.log("Usage load failed");
  }

  window.onload = function() {
  loadUsage();
  toggleQuality();
};
}

</script>

</body>
</html>
